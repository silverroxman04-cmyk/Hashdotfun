<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teaching & Learning — Practice Quiz</title>
<style>
  :root{
    --ink:#1c2b24;
    --paper:#f6f1e4;
    --rule:#c9bfa3;
    --accent:#8a3b2f;
    --accent-2:#2f5d4f;
    --wrong:#b4392b;
    --right:#2f6b4f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia,'Iowan Old Style',serif;
    line-height:1.5;
  }
  header{
    padding:28px 20px 18px;
    border-bottom:3px double var(--rule);
    text-align:center;
  }
  header h1{
    margin:0;
    font-size:1.5rem;
    letter-spacing:0.02em;
  }
  header p{
    margin:6px 0 0;
    font-size:0.85rem;
    color:#5a5346;
    font-family:Helvetica,Arial,sans-serif;
    text-transform:uppercase;
    letter-spacing:0.12em;
  }
  #score-bar{
    position:sticky;
    top:0;
    background:var(--paper);
    border-bottom:1px solid var(--rule);
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.85rem;
    z-index:5;
  }
  #score-bar strong{font-size:1.1rem;}
  main{
    max-width:720px;
    margin:0 auto;
    padding:20px 20px 80px;
  }
  .q{
    margin-bottom:26px;
    padding-bottom:18px;
    border-bottom:1px solid var(--rule);
  }
  .q-unit{
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--accent-2);
    margin-bottom:4px;
  }
  .q-text{
    font-weight:bold;
    margin-bottom:10px;
  }
  .opt{
    display:block;
    padding:8px 10px;
    margin:6px 0;
    border:1px solid var(--rule);
    border-radius:3px;
    cursor:pointer;
    background:#fffdf8;
    transition:background .15s;
  }
  .opt:hover{background:#fbf3e2;}
  .opt input{margin-right:8px;}
  .opt.correct{border-color:var(--right);background:#e6f0e9;}
  .opt.incorrect{border-color:var(--wrong);background:#f6e5e2;}
  .explain{
    display:none;
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.82rem;
    color:#4a4436;
    margin-top:8px;
    padding-left:4px;
    border-left:3px solid var(--rule);
    padding-left:10px;
  }
  #submit-row{
    text-align:center;
    margin:30px 0;
  }
  button{
    font-family:Helvetica,Arial,sans-serif;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:12px 26px;
    font-size:0.95rem;
    letter-spacing:0.04em;
    border-radius:3px;
    cursor:pointer;
  }
  button:hover{background:#732f26;}
  button.secondary{
    background:transparent;
    color:var(--accent);
    border:1px solid var(--accent);
    margin-left:10px;
  }
  #result{
    text-align:center;
    font-family:Helvetica,Arial,sans-serif;
    padding:14px;
    margin-bottom:10px;
    display:none;
  }
  #timer-display.low{
    color:var(--wrong);
    font-weight:bold;
  }
  #progress-text{
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.8rem;
    color:#5a5346;
    text-align:center;
    margin-bottom:6px;
  }
  #progress-bar{
    height:6px;
    background:#e6ddc8;
    border-radius:3px;
    overflow:hidden;
    margin-bottom:22px;
  }
  #progress-fill{
    height:100%;
    background:var(--accent-2);
    width:0%;
    transition:width .2s;
  }
  #nav-row{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
  }
  button:disabled{
    opacity:0.4;
    cursor:default;
  }
  #course-screen{
    max-width:640px;
    margin:0 auto;
    padding:30px 20px 60px;
  }
  #course-screen h2{
    font-size:1.1rem;
    margin-bottom:4px;
  }
  #course-screen .sub{
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.85rem;
    color:#5a5346;
    margin-bottom:24px;
  }
  .course-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px;
    margin-bottom:12px;
    border:1px solid var(--rule);
    border-radius:5px;
    background:#fffdf8;
    cursor:pointer;
  }
  .course-card.locked{
    cursor:default;
    opacity:0.6;
  }
  .course-card .code{
    font-weight:bold;
    font-size:1rem;
  }
  .course-card .status{
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .course-card.open .status{color:var(--right);}
  .course-card.locked .status{color:var(--wrong);}
  #locked-msg{
    display:none;
    font-family:Helvetica,Arial,sans-serif;
    font-size:0.85rem;
    color:var(--wrong);
    text-align:center;
    margin-top:14px;
  }
  #change-course-row{
    text-align:center;
    margin-bottom:10px;
  }
  #change-course-btn{
    background:transparent;
    color:var(--accent-2);
    border:1px solid var(--accent-2);
    padding:6px 14px;
    font-size:0.8rem;
  }
</style>
</head>
<body>

<header>
  <h1 id="page-title">Practice Quiz</h1>
  <p id="page-sub">Pick a course to start</p>
</header>

<div id="course-screen">
  <h2>Choose a course</h2>
  <div class="sub">20 random questions per session · 10-minute timer · auto-graded</div>
  <div id="course-list"></div>
  <div id="locked-msg">This course isn't unlocked yet. The material hasn't been sent for it.</div>
</div>

<div id="quiz-screen" style="display:none;">

  <div id="score-bar">
    <span>Answered: <strong id="answered-count">0</strong> / <span id="total-count">0</span></span>
    <span id="timer-display">Time left: <strong id="timer-value">10:00</strong></span>
    <span>Score: <strong id="live-score">—</strong></span>
  </div>

  <main>
    <div id="change-course-row">
      <button type="button" id="change-course-btn">Change course</button>
    </div>
    <div id="result"></div>
    <div id="progress-text"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <form id="quiz-form"></form>
    <div id="nav-row">
      <button type="button" id="prev-btn" class="secondary">Previous</button>
      <button type="button" id="submit-mid-btn" class="secondary">Submit now</button>
      <button type="button" id="next-btn">Next</button>
    </div>
    <div id="submit-row" style="display:none;">
      <button type="button" id="reset-btn" class="secondary">Try again (same course)</button>
    </div>
  </main>

</div>

<script>
const EDT118_QUESTIONS = [

const COURSES = [
  {code:"EDT 118", name:"Teaching and Learning", questions: EDT118_QUESTIONS},
  {code:"GST 112", name:"", questions: null},
  {code:"EDU 102", name:"", questions: null},
  {code:"ECO 102", name:"", questions: null},
  {code:"ECO 104", name:"", questions: null},
  {code:"LIB 002", name:"", questions: null},
  {code:"ALL 124", name:"", questions: null},
  {code:"ALL 126", name:"", questions: null},
  {code:"EDT 120", name:"", questions: null}
];

const SESSION_SIZE = 20;
const TIME_LIMIT_SECONDS = 600; // 10 minutes

const courseScreen = document.getElementById('course-screen');
const courseList = document.getElementById('course-list');
const lockedMsg = document.getElementById('locked-msg');
const quizScreen = document.getElementById('quiz-screen');
const pageTitle = document.getElementById('page-title');
const pageSub = document.getElementById('page-sub');
const changeCourseBtn = document.getElementById('change-course-btn');
const submitMidBtn = document.getElementById('submit-mid-btn');

const form = document.getElementById('quiz-form');
const answeredCountEl = document.getElementById('answered-count');
const totalCountEl = document.getElementById('total-count');
const liveScoreEl = document.getElementById('live-score');
const resultEl = document.getElementById('result');
const timerValueEl = document.getElementById('timer-value');
const timerDisplayEl = document.getElementById('timer-display');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const navRow = document.getElementById('nav-row');
const submitRow = document.getElementById('submit-row');
const resetBtn = document.getElementById('reset-btn');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');

let activeCourse = null;
let sessionQuestions = [];
let answers = [];
let currentIndex = 0;
let timerInterval = null;
let secondsLeft = TIME_LIMIT_SECONDS;
let graded = false;

function renderCourseList(){
  courseList.innerHTML = '';
  COURSES.forEach(course => {
    const open = !!course.questions;
    const card = document.createElement('div');
    card.className = 'course-card ' + (open ? 'open' : 'locked');
    card.innerHTML = `
      <span class="code">${course.code}${course.name ? ' — ' + course.name : ''}</span>
      <span class="status">${open ? 'Available' : 'Locked'}</span>
    `;
    card.addEventListener('click', () => {
      if (open){
        lockedMsg.style.display = 'none';
        startCourse(course);
      } else {
        lockedMsg.style.display = 'block';
      }
    });
    courseList.appendChild(card);
  });
}

function startCourse(course){
  activeCourse = course;
  pageTitle.textContent = course.code + ' Practice Quiz';
  pageSub.textContent = course.name || 'Practice quiz';
  courseScreen.style.display = 'none';
  quizScreen.style.display = 'block';
  graded = false;
  resultEl.style.display = 'none';
  navRow.style.display = 'flex';
  submitRow.style.display = 'none';
  progressText.style.display = 'block';
  progressFill.parentElement.style.display = 'block';
  liveScoreEl.textContent = '—';
  pickSession();
  renderQuestion();
  startTimer();
}

changeCourseBtn.addEventListener('click', () => {
  clearInterval(timerInterval);
  quizScreen.style.display = 'none';
  courseScreen.style.display = 'block';
  pageTitle.textContent = 'Practice Quiz';
  pageSub.textContent = 'Pick a course to start';
});

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickSession(){
  sessionQuestions = shuffle(activeCourse.questions).slice(0, SESSION_SIZE);
  answers = new Array(sessionQuestions.length).fill(null);
  currentIndex = 0;
  totalCountEl.textContent = sessionQuestions.length;
}

function updateAnsweredCount(){
  const answered = answers.filter(a => a !== null).length;
  answeredCountEl.textContent = answered;
}

function updateProgress(){
  progressText.textContent = 'Question ' + (currentIndex + 1) + ' of ' + sessionQuestions.length;
  progressFill.style.width = Math.round(((currentIndex + 1) / sessionQuestions.length) * 100) + '%';
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === sessionQuestions.length - 1;
}

function renderQuestion(){
  const item = sessionQuestions[currentIndex];
  form.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'q';

  const unitTag = document.createElement('div');
  unitTag.className = 'q-unit';
  unitTag.textContent = item.unit;
  div.appendChild(unitTag);

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = item.q;
  div.appendChild(qText);

  item.options.forEach((opt, oi) => {
    const label = document.createElement('label');
    label.className = 'opt';
    const checkedAttr = answers[currentIndex] === oi ? 'checked' : '';
    label.innerHTML = `<input type="radio" name="current-q" value="${oi}" ${checkedAttr}> ${opt}`;
    label.querySelector('input').addEventListener('change', () => {
      answers[currentIndex] = oi;
      updateAnsweredCount();
    });
    div.appendChild(label);
  });

  form.appendChild(div);
  updateProgress();
}

prevBtn.addEventListener('click', () => {
  if (currentIndex > 0){
    currentIndex--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  if (currentIndex < sessionQuestions.length - 1){
    currentIndex++;
    renderQuestion();
  }
});

submitMidBtn.addEventListener('click', () => gradeQuiz(false));

function formatTime(s){
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function startTimer(){
  clearInterval(timerInterval);
  secondsLeft = TIME_LIMIT_SECONDS;
  timerDisplayEl.classList.remove('low');
  timerValueEl.textContent = formatTime(secondsLeft);

  timerInterval = setInterval(() => {
    secondsLeft--;
    timerValueEl.textContent = formatTime(Math.max(secondsLeft, 0));
    if (secondsLeft <= 60) timerDisplayEl.classList.add('low');
    if (secondsLeft <= 0){
      clearInterval(timerInterval);
      if (!graded) gradeQuiz(true);
    }
  }, 1000);
}

function gradeQuiz(timedOut){
  if (graded) return;
  graded = true;
  clearInterval(timerInterval);

  let score = 0;
  sessionQuestions.forEach((item, qi) => {
    if (answers[qi] === item.answer) score++;
  });

  liveScoreEl.textContent = score + ' / ' + sessionQuestions.length;
  const pct = Math.round((score / sessionQuestions.length) * 100);

  navRow.style.display = 'none';
  submitRow.style.display = 'block';
  progressText.style.display = 'none';
  progressFill.parentElement.style.display = 'none';

  form.innerHTML = '';
  sessionQuestions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'q';

    const unitTag = document.createElement('div');
    unitTag.className = 'q-unit';
    unitTag.textContent = item.unit + ' · Question ' + (qi + 1);
    div.appendChild(unitTag);

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = item.q;
    div.appendChild(qText);

    item.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'opt';
      if (oi === item.answer) label.classList.add('correct');
      else if (oi === answers[qi]) label.classList.add('incorrect');
      label.innerHTML = `<input type="radio" disabled ${oi === answers[qi] ? 'checked' : ''}> ${opt}`;
      div.appendChild(label);
    });

    form.appendChild(div);
  });

  resultEl.style.display = 'block';
  const timeoutNote = timedOut ? ' — time ran out' : '';
  resultEl.innerHTML = `<strong style="font-size:1.3rem;">You scored ${score} / ${sessionQuestions.length} (${pct}%)${timeoutNote}</strong>`;
  resultEl.scrollIntoView({behavior:'smooth'});
}

resetBtn.addEventListener('click', () => {
  startCourse(activeCourse);
});

renderCourseList();
</script>

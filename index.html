<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HashQuiz — Practice Smarter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  }

    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.08em;

    font-size:0.95rem;
    color:#eef2ff;
    font-weight:500;
  }

    font-size:0.78rem;
    color:#c7d2fe;
    font-weight:500;
    letter-spacing:0.06em;
  }

    top:0;
    background:var(--paper);

    padding:20px 20px 80px;
  }
  .q{
    margin-bottom:26px;
    padding-bottom:18px;
    border-bottom:1px solid var(--rule);
  }

    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--header-blue);
    margin-bottom:4px;
  }
  .q-text{
    font-weight:bold;
    margin-bottom:10px;
  }
  .opt{
    display:block;
    padding:8px 10px;
    margin:6px 0;
    border:1px solid var(--rule);
    border-radius:8px;
    cursor:pointer;
    background:var(--card);
    transition:background .15s;
  }
  .opt:hover{background:#f3f4f6;}
  .opt input{margin-right:8px;}
  .opt.correct{border-color:var(--right);background:#e6f9f1;}
  .opt.incorrect{border-color:var(--wrong);background:#fdecec;}
  .explain{
    display:none;
    font-family:'Inter',Helvetica,Arial,sans-serif;
    font-size:0.82rem;
    color:var(--secondary);
    margin-top:8px;
    padding-left:4px;
    border-left:3px solid var(--rule);
    padding-left:10px;
  }
  #submit-row{
    text-align:center;
    margin:30px 0;
  }
  button{
    font-family:'Inter',Helvetica,Arial,sans-serif;
    font-weight:600;
    background:var(--primary);
    color:#fff;
    border:none;
    padding:12px 26px;
    font-size:0.95rem;
    letter-spacing:0.01em;
    border-radius:8px;

    margin-left:10px;

    padding:14px;
    margin-bottom:10px;
    display:none;

  }

    font-size:0.8rem;
    color:var(--secondary);
    text-align:center;
    margin-bottom:6px;
  }
  #progress-bar{
    height:6px;
    background:var(--rule);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:22px;
  }
  #progress-fill{
    height:100%;
    background:var(--header-blue);
    width:0%;
    transition:width .2s;
  }
  #nav-row{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
  }
  button:disabled{
    opacity:0.4;
    cursor:default;
  }

    margin:0 auto;

    font-weight:700;
    margin-bottom:4px;

  }
  .course-card.open:active{

  }
  .course-card.locked{
    cursor:default;
    opacity:0.6;
  }
  .course-card .code{
    font-weight:700;
    font-size:1rem;
  }
  .course-card .status{
    font-family:'Inter',Helvetica,Arial,sans-serif;
    font-size:0.75rem;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .course-card.open .status{color:var(--right);}
  .course-card.locked .status{color:var(--wrong);}
  #locked-msg{
    display:none;
    font-family:'Inter',Helvetica,Arial,sans-serif;
    font-size:0.85rem;
    color:var(--wrong);
    text-align:center;

  }
  #change-course-row{

    margin-bottom:10px;
  }
  #active-course-label{

    font-size:0.8rem;
  }
  footer{
    text-align:center;
    padding:18px 20px 26px;
    font-size:0.78rem;
    color:var(--secondary);
  }
</style>
</head>

<header>
  <h1 id="page-title">🎓 HashQuiz</h1>
  <div class="byline">by Hash</div>
  <div class="tagline">Practice smarter.</div>
  <p id="page-sub">20 Questions • 10 Minutes • Instant Result</p>
</header>

<div id="course-screen">
  <h2>Choose a course</h2>
  <div class="sub">20 random questions per session · 10-minute timer · auto-graded</div>
  <div id="course-list"></div>
  <div id="locked-msg">This course isn't unlocked yet. The material hasn't been sent for it.</div>
</div>

<div id="quiz-screen" style="display:none;">

  <div id="score-bar">

  <main>
    <div id="change-course-row">
      <span id="active-course-label"></span>
      <button type="button" id="change-course-btn">Change course</button>
    </div>
    <div id="result"></div>
    <div id="progress-text"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <form id="quiz-form"></form>
    <div id="nav-row">
      <button type="button" id="prev-btn" class="secondary">Previous</button>
      <button type="button" id="submit-mid-btn" class="secondary">Submit now</button>
      <button type="button" id="next-btn">Next</button>
    </div>
    <div id="submit-row" style="display:none;">
      <button type="button" id="reset-btn" class="secondary">Try again (same course)</button>
    </div>
  </main>

</div>

const COURSES = [
  {code:"EDT 118", name:"", questions: EDT118_QUESTIONS},
  {code:"ECO 102", name:"", questions: ECO102_QUESTIONS},
  {code:"ETL 114", name:"", questions: ETL114_QUESTIONS},
  {code:"GST 112", name:"", questions: GST112_QUESTIONS},
  {code:"EDU 102", name:"", questions: null},
  {code:"ECO 104", name:"", questions: null},
  {code:"LIB 002", name:"", questions: null},
  {code:"ALL 124", name:"", questions: null},
  {code:"ALL 126", name:"", questions: null},
  {code:"EDT 120", name:"", questions: null}
];

const SESSION_SIZE = 20;
const TIME_LIMIT_SECONDS = 600; // 10 minutes

const courseScreen = document.getElementById('course-screen');
const courseList = document.getElementById('course-list');
const lockedMsg = document.getElementById('locked-msg');
const quizScreen = document.getElementById('quiz-screen');
const pageTitle = document.getElementById('page-title');
const pageSub = document.getElementById('page-sub');
const changeCourseBtn = document.getElementById('change-course-btn');
const submitMidBtn = document.getElementById('submit-mid-btn');

const form = document.getElementById('quiz-form');
const answeredCountEl = document.getElementById('answered-count');
const totalCountEl = document.getElementById('total-count');
const liveScoreEl = document.getElementById('live-score');
const resultEl = document.getElementById('result');
const timerValueEl = document.getElementById('timer-value');
const timerDisplayEl = document.getElementById('timer-display');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const navRow = document.getElementById('nav-row');
const submitRow = document.getElementById('submit-row');
const resetBtn = document.getElementById('reset-btn');
const progressText = document.getElementById('progress-text');
const progressFill = document.getElementById('progress-fill');

let activeCourse = null;
let sessionQuestions = [];
let answers = [];
let currentIndex = 0;
let timerInterval = null;
let secondsLeft = TIME_LIMIT_SECONDS;
let graded = false;

function renderCourseList(){
  courseList.innerHTML = '';
  COURSES.forEach(course => {
    const open = !!course.questions;
    const card = document.createElement('div');
    card.className = 'course-card ' + (open ? 'open' : 'locked');
    card.innerHTML = `
      <span class="code">${course.code}${course.name ? ' — ' + course.name : ''}</span>
      <span class="status">${open ? 'Available' : 'Locked'}</span>
    `;
    card.addEventListener('click', () => {
      if (open){
        lockedMsg.style.display = 'none';
        startCourse(course);
      } else {
        lockedMsg.style.display = 'block';
      }
    });
    courseList.appendChild(card);
  });
}

function startCourse(course){
  activeCourse = course;
  document.getElementById('active-course-label').textContent = course.code;
  courseScreen.style.display = 'none';
  quizScreen.style.display = 'block';
  graded = false;
  resultEl.style.display = 'none';
  navRow.style.display = 'flex';
  submitRow.style.display = 'none';
  progressText.style.display = 'block';
  progressFill.parentElement.style.display = 'block';
  liveScoreEl.textContent = '—';
  pickSession();
  renderQuestion();
  startTimer();
}

changeCourseBtn.addEventListener('click', () => {
  clearInterval(timerInterval);
  quizScreen.style.display = 'none';
  courseScreen.style.display = 'block';
});

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickSession(){
  sessionQuestions = shuffle(activeCourse.questions).slice(0, SESSION_SIZE);
  answers = new Array(sessionQuestions.length).fill(null);
  currentIndex = 0;
  totalCountEl.textContent = sessionQuestions.length;
}

function updateAnsweredCount(){
  const answered = answers.filter(a => a !== null).length;
  answeredCountEl.textContent = answered;
}

function updateProgress(){
  progressText.textContent = 'Question ' + (currentIndex + 1) + ' of ' + sessionQuestions.length;
  progressFill.style.width = Math.round(((currentIndex + 1) / sessionQuestions.length) * 100) + '%';
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === sessionQuestions.length - 1;
}

function renderQuestion(){
  const item = sessionQuestions[currentIndex];
  form.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'q';

  const unitTag = document.createElement('div');
  unitTag.className = 'q-unit';
  unitTag.textContent = item.unit;
  div.appendChild(unitTag);

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = item.q;
  div.appendChild(qText);

  item.options.forEach((opt, oi) => {
    const label = document.createElement('label');
    label.className = 'opt';
    const checkedAttr = answers[currentIndex] === oi ? 'checked' : '';
    label.innerHTML = `<input type="radio" name="current-q" value="${oi}" ${checkedAttr}> ${opt}`;
    label.querySelector('input').addEventListener('change', () => {
      answers[currentIndex] = oi;
      updateAnsweredCount();
    });
    div.appendChild(label);
  });

  form.appendChild(div);
  updateProgress();
}

prevBtn.addEventListener('click', () => {
  if (currentIndex > 0){
    currentIndex--;
    renderQuestion();
  }
});

nextBtn.addEventListener('click', () => {
  if (currentIndex < sessionQuestions.length - 1){
    currentIndex++;
    renderQuestion();
  }
});

submitMidBtn.addEventListener('click', () => gradeQuiz(false));

function formatTime(s){
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function startTimer(){
  clearInterval(timerInterval);
  secondsLeft = TIME_LIMIT_SECONDS;
  timerDisplayEl.classList.remove('low');
  timerValueEl.textContent = formatTime(secondsLeft);

  timerInterval = setInterval(() => {
    secondsLeft--;
    timerValueEl.textContent = formatTime(Math.max(secondsLeft, 0));
    if (secondsLeft <= 60) timerDisplayEl.classList.add('low');
    if (secondsLeft <= 0){
      clearInterval(timerInterval);
      if (!graded) gradeQuiz(true);
    }
  }, 1000);
}

function gradeQuiz(timedOut){
  if (graded) return;
  graded = true;
  clearInterval(timerInterval);

  let score = 0;
  sessionQuestions.forEach((item, qi) => {
    if (answers[qi] === item.answer) score++;
  });

  liveScoreEl.textContent = score + ' / ' + sessionQuestions.length;
  const pct = Math.round((score / sessionQuestions.length) * 100);

  navRow.style.display = 'none';
  submitRow.style.display = 'block';
  progressText.style.display = 'none';
  progressFill.parentElement.style.display = 'none';

  form.innerHTML = '';
  sessionQuestions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'q';

    const unitTag = document.createElement('div');
    unitTag.className = 'q-unit';
    unitTag.textContent = item.unit + ' · Question ' + (qi + 1);
    div.appendChild(unitTag);

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = item.q;
    div.appendChild(qText);

    item.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'opt';
      if (oi === item.answer) label.classList.add('correct');
      else if (oi === answers[qi]) label.classList.add('incorrect');
      label.innerHTML = `<input type="radio" disabled ${oi === answers[qi] ? 'checked' : ''}> ${opt}`;
      div.appendChild(label);
    });

    form.appendChild(div);
  });

  resultEl.style.display = 'block';
  const timeoutNote = timedOut ? ' — time ran out' : '';
  resultEl.innerHTML = `<strong style="font-size:1.3rem;">You scored ${score} / ${sessionQuestions.length} (${pct}%)${timeoutNote}</strong>`;
  resultEl.scrollIntoView({behavior:'smooth'});
}

resetBtn.addEventListener('click', () => {
  startCourse(activeCourse);
});

renderCourseList();
</script>
